<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="theme-color" content="#1e1b4b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PVC Master">
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFlMWI0YiIvPjx0ZXh0IHg9IjUwIiB5PSI2MCIgZm9udC1zaXplPSI1MCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIj5QVkM8L3RleHQ+PC9zdmc+">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFlMWI0YiIvPjx0ZXh0IHg9IjUwIiB5PSI2MCIgZm9udC1zaXplPSI1MCIgZmlsbD0id2hpdGUiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIj5QVkM8L3RleHQ+PC9zdmc+">

    <title>PVC Master V10.12 - App</title>
    <style>
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #0f172a; --success: #16a34a; --warning: #d97706; --ai: #8b5cf6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; -webkit-user-select: none; user-select: none; }
        input, button { -webkit-user-select: auto; user-select: auto; }

        header { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); color: white; padding: 16px; position: sticky; top: 0; z-index: 90; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; padding-top: env(safe-area-inset-top, 16px); }
        h1 { margin: 0; font-size: 18px; font-weight: 800; }
        .badge { background: #fbbf24; color: #451a03; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 8px; vertical-align: middle; }
        .btn-config { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight:bold; cursor: pointer; transition: 0.2s; }
        .btn-config.active { background: #4ade80; color: #064e3b; }

        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        label { display: block; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 6px; }
        input { width: 100%; padding: 14px; border: 2px solid #cbd5e1; border-radius: 10px; font-size: 18px; outline: none; background: #f8fafc; font-family: monospace; font-weight: bold; margin-bottom: 15px; }
        input:focus { border-color: var(--primary); background: #fff; }

        .btn-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 12px; }
        .btn-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        
        button { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
        button:active { transform: scale(0.96); }
        .btn-add { background: var(--primary); color: white; }
        .btn-opt { background: var(--success); color: white; }
        .btn-ia { background: var(--ai); color: white; }
        .btn-sec { background: white; border: 2px solid #e2e8f0; color: #64748b; font-size: 13px; padding: 12px; }
        
        .window-item { background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        .win-header { background: linear-gradient(to right, #f1f5f9, #f8fafc); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .win-tag { background: #e0e7ff; color: #3730a3; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 8px; font-weight:bold; }
        .win-cost { color: #15803d; font-weight: 900; font-size: 14px; margin-left: auto; margin-right: 15px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        td { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; }
        .val { font-family: monospace; font-weight: bold; font-size: 15px; text-align: right; color: #1e293b; }
        
        .opt-block { display: none; margin-bottom: 20px; }
        .ia-card { background: #f5f3ff; border: 2px solid #ddd6fe; border-radius: 12px; padding: 15px; margin-bottom: 20px; display: none; }
        .ia-alert { background: white; border-left: 4px solid var(--warning); padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 13px; color: #334155; }
        .ia-ok { background: white; border-left: 4px solid var(--success); padding: 10px; border-radius: 4px; font-size: 13px; color: #166534; font-weight: bold; }

        .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .summary-card { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px; border-radius: 10px; text-align: center; }
        .summary-num { display: block; font-size: 24px; font-weight: 800; color: #166534; }
        .summary-lbl { font-size: 10px; text-transform: uppercase; font-weight: bold; color: #15803d; }

        .bar-container { margin-bottom: 15px; background: white; border: 1px solid #e2e8f0; padding: 10px; border-radius: 8px; }
        .bar-visual { display: flex; height: 24px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin: 8px 0; border: 1px solid #cbd5e1; }
        .cut { height: 100%; background: #4f46e5; border-right: 1px solid rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; font-weight: bold; }
        .waste { height: 100%; background: #fecaca; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: white; border-radius: 16px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .modal-grid input { font-size: 14px; padding: 10px; margin-bottom: 5px; }

        .canvas-box { height: 200px; background: #f8fafc; border: 2px dashed #cbd5e1; border-radius: 12px; position: relative; margin-top: 15px; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; }

        @media print {
            header, .input-area, .btn-sec, .btn-add, .btn-opt, .btn-ia { display: none !important; }
            .opt-block { display: block !important; break-before: page; }
            body { background: white; }
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>PVC MASTER <span class="badge">S80/S60</span></h1>
        </div>
        <button type="button" class="btn-config" id="btnAbreModal">⚙️ Precios</button>
    </header>

    <div class="container">
        <div class="card input-area">
            <label>Referencia</label>
            <input type="text" id="inputTag" placeholder="Ej: Ventana 1">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>Ancho (mm)</label><input type="number" id="inputWidth" placeholder="0"></div>
                <div><label>Alto (mm)</label><input type="number" id="inputHeight" placeholder="0"></div>
            </div>

            <div class="btn-grid">
                <button type="button" id="btnAgregar" class="btn-add">+ AGREGAR A LA LISTA</button>
            </div>
            <div class="btn-grid-2">
                <button type="button" id="btnCalcular" class="btn-opt">📦 PEDIDO</button>
                <button type="button" id="btnIA" class="btn-ia">🤖 ANÁLISIS IA</button>
            </div>
            
            <div class="btn-grid-2" style="margin-bottom:0;">
                <button type="button" id="btnBorrarTodo" class="btn-sec" style="color:#ef4444;">Borrar Todo</button>
                <button type="button" id="btnImprimir" class="btn-sec">🖨️ PDF</button>
            </div>
        </div>

        <div id="iaResult" class="ia-card"></div>
        <div id="optResult" class="opt-block"></div>
        <div id="listaResultados"></div>

        <div class="card" id="visorCard" style="display:none;">
            <label>Esquema Visual S80/S60</label>
            <div class="canvas-box"><canvas id="windowCanvas"></canvas></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalPrecios">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size:18px; color:#1e1b4b;">Configurar Precios</h2>
            <p style="font-size:12px; color:#64748b; margin-bottom:15px;">Calculadora de Insumos.</p>
            
            <div class="modal-grid">
                <div><label>Marco S80 (Tira)</label><input type="number" id="p_marco" placeholder="0"></div>
                <div><label>Hoja S60 (Tira)</label><input type="number" id="p_hoja" placeholder="0"></div>
                <div><label>Cedazo S80 (Tira)</label><input type="number" id="p_cedazo" placeholder="0"></div>
                <div><label>Enganche (Tira)</label><input type="number" id="p_enganche" placeholder="0"></div>
                <div><label>Tapa (Tira)</label><input type="number" id="p_tapa" placeholder="0"></div>
                <div><label>Batiente (Tira)</label><input type="number" id="p_bat" placeholder="0"></div>
                <div><label>Vidrio (m²)</label><input type="number" id="p_vidrio" placeholder="0"></div>
                <div><label>Malla (m²)</label><input type="number" id="p_malla" placeholder="0"></div>
                <div><label>Rodos (Unidad)</label><input type="number" id="p_rodo" placeholder="0"></div>
                <div><label>Cierre (Unidad)</label><input type="number" id="p_cierre" placeholder="0"></div>
                <div><label>Rose Cedazo (m)</label><input type="number" id="p_rose" placeholder="0"></div>
                <div><label>Sellador (Tubo)</label><input type="number" id="p_sellador" placeholder="0"></div>
            </div>

            <button type="button" id="btnGuardarPrecios" class="btn-add">Guardar y Aplicar</button>
            <button type="button" id="btnCerrarModal" class="btn-sec" style="margin-bottom:0; margin-top:10px;">Cancelar</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            let listaVentanas = [];
            let precios = { marco:0, hoja:0, cedazo:0, enganche:0, tapa:0, bat:0, vidrio:0, malla:0, rodo:0, cierre:0, rose:0, sellador:0 };
            const BARRA_LARGO = 5800; 
            const DISCO = 4; 

            // Memoria Segura
            function safeSave(key, data) {
                try { localStorage.setItem(key, JSON.stringify(data)); } catch (e) {}
            }

            function safeLoad(key) {
                try {
                    const data = localStorage.getItem(key);
                    return data ? JSON.parse(data) : null;
                } catch (e) { return null; }
            }

            // CARGA INICIAL
            const dV = safeLoad('pvc_data_1012');
            if(dV) listaVentanas = dV;
            
            const dP = safeLoad('pvc_precios_1012');
            if(dP) { 
                precios = { ...precios, ...dP }; 
                document.getElementById('btnAbreModal').innerHTML = "✅ Precios";
                document.getElementById('btnAbreModal').classList.add("active");
            }

            // EVENT LISTENERS
            document.getElementById('btnAgregar').addEventListener('click', agregarVentana);
            document.getElementById('btnCalcular').addEventListener('click', calcularTodo);
            document.getElementById('btnIA').addEventListener('click', analizarIA);
            document.getElementById('btnBorrarTodo').addEventListener('click', borrarTodo);
            document.getElementById('btnImprimir').addEventListener('click', () => window.print());
            document.getElementById('btnAbreModal').addEventListener('click', abrirModal);
            document.getElementById('btnGuardarPrecios').addEventListener('click', guardarPrecios);
            document.getElementById('btnCerrarModal').addEventListener('click', cerrarModal);

            window.borrarItem = function(id) {
                if(confirm("¿Quitar de la lista?")) { 
                    listaVentanas = listaVentanas.filter(v => v.id !== id); 
                    safeSave('pvc_data_1012', listaVentanas);
                    renderizar(); 
                    document.getElementById('optResult').style.display = 'none'; 
                    document.getElementById('iaResult').style.display = 'none'; 
                }
            };
            
            window.cerrarOpt = function() { document.getElementById('optResult').style.display = 'none'; };
            window.cerrarIA = function() { document.getElementById('iaResult').style.display = 'none'; };

            // FUNCIONES
            function agregarVentana() {
                const wInput = document.getElementById('inputWidth');
                const hInput = document.getElementById('inputHeight');
                const w = parseFloat(wInput.value);
                const h = parseFloat(hInput.value);
                const tag = document.getElementById('inputTag').value || `V-${listaVentanas.length + 1}`;

                if (!w || !h || w <= 0 || h <= 0) return alert("⚠️ Ingresa Ancho y Alto válidos.");

                const hoja_sierra_w = Math.floor((w / 2) + 3);
                const hoja_sierra_h = Math.floor(h - 75);
                const h_real_w = hoja_sierra_w - 5;
                const h_real_h = hoja_sierra_h - 5;

                const res = {
                    ancho: w + 5, alto: h + 5,
                    hoja_w: hoja_sierra_w, hoja_h: hoja_sierra_h,
                    cedazo_w: hoja_sierra_w - 10, cedazo_h: hoja_sierra_h,
                    vidrio_w: h_real_w - 85, vidrio_h: h_real_h - 85,
                    tapa: h_real_h,
                    bat_w: h_real_w - 80, bat_h: h_real_h - 78,
                    enganche: hoja_sierra_h
                };

                const costo = calcularCostoVentana(res);

                listaVentanas.unshift({ id: Date.now(), w, h, tag, res, costo });
                safeSave('pvc_data_1012', listaVentanas);
                
                renderizar();
                wInput.value = ''; hInput.value = ''; document.getElementById('inputTag').value = '';
                wInput.focus();
                document.getElementById('optResult').style.display = 'none';
                document.getElementById('iaResult').style.display = 'none';
                
                const visor = document.getElementById('visorCard');
                visor.style.display = 'block';
                setTimeout(() => dibujar(w, h), 100);
            }

            function calcularTodo() {
                if (listaVentanas.length === 0) return alert("Agrega ventanas a la lista primero.");

                let cortes = { marco: [], hoja: [], cedazo: [], enganche: [], tapa: [], batiente: [] };
                let totalRodos = 0, totalCierres = 0, areaVidrio = 0, areaMalla = 0;
                let totalRose = 0, totalSellador = 0;

                listaVentanas.forEach(v => {
                    const t = v.tag;
                    pushCorte(cortes.marco, v.res.ancho, 2, t);
                    pushCorte(cortes.marco, v.res.alto, 2, t);
                    pushCorte(cortes.hoja, v.res.hoja_w, 4, t);
                    pushCorte(cortes.hoja, v.res.hoja_h, 4, t);
                    pushCorte(cortes.cedazo, v.res.cedazo_w, 2, t);
                    pushCorte(cortes.cedazo, v.res.cedazo_h, 2, t);
                    pushCorte(cortes.enganche, v.res.enganche, 2, t);
                    pushCorte(cortes.tapa, v.res.tapa, 2, t);
                    pushCorte(cortes.batiente, v.res.bat_w, 4, t);
                    pushCorte(cortes.batiente, v.res.bat_h, 4, t);

                    totalRodos += 2; 
                    totalCierres += 1;
                    areaVidrio += (v.res.vidrio_w * v.res.vidrio_h * 2) / 1000000;
                    areaMalla += (v.res.cedazo_w * v.res.cedazo_h) / 1000000;
                    totalRose += ((v.res.cedazo_w * 2) + (v.res.cedazo_h * 2)) / 1000;
                    totalSellador += 1;
                });

                const bMarco = optimizar(cortes.marco);
                const bHoja = optimizar(cortes.hoja);
                const bCedazo = optimizar(cortes.cedazo);
                const bEnganche = optimizar(cortes.enganche);
                const bTapa = optimizar(cortes.tapa);
                const bBat = optimizar(cortes.batiente);

                let inv_perfiles = (bMarco.length * precios.marco) + (bHoja.length * precios.hoja) + (bCedazo.length * precios.cedazo) + (bEnganche.length * precios.enganche) + (bTapa.length * precios.tapa) + (bBat.length * precios.bat);
                let inv_extras = (areaVidrio * precios.vidrio) + (areaMalla * precios.malla) + (totalRodos * precios.rodo) + (totalCierres * precios.cierre) + (totalRose * precios.rose) + (totalSellador * precios.sellador);
                let inversion_total = inv_perfiles + inv_extras;

                const div = document.getElementById('optResult');
                div.style.display = 'block';
                div.innerHTML = `
                    <div class="card" style="border-top: 5px solid #16a34a;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3 style="margin:0; color:#166534;">📦 REPORTE DE COMPRA</h3>
                            <button type="button" onclick="window.cerrarOpt()" style="width:auto; padding:6px 12px; margin:0; font-size:12px; background:#f1f5f9; color:#475569;">Cerrar</button>
                        </div>

                        <div style="background:#1e293b; color:white; padding:15px; border-radius:10px; text-align:center; margin-bottom:20px;">
                            <span style="font-size:12px; opacity:0.8; text-transform:uppercase;">Presupuesto Total de Insumos</span>
                            <div style="font-size:32px; font-weight:900; color:#4ade80;">$ ${inversion_total.toFixed(2)}</div>
                        </div>

                        <div class="summary-grid">
                            <div class="summary-card"><span class="summary-num">${bMarco.length}</span><span class="summary-lbl">Marco S80</span></div>
                            <div class="summary-card"><span class="summary-num">${bHoja.length}</span><span class="summary-lbl">Hoja S60</span></div>
                            <div class="summary-card"><span class="summary-num">${bCedazo.length}</span><span class="summary-lbl">Cedazo S80</span></div>
                            <div class="summary-card"><span class="summary-num">${bEnganche.length}</span><span class="summary-lbl">Enganches</span></div>
